services:
    php:
        build:
            context: docker
            dockerfile: Dockerfile
        container_name: laravel-php
        volumes:
            - ./:/var/www/laravel
        depends_on:
            - mysql
            - redis
        networks:
            - laravel-net

    nginx:
        image: nginx:stable-alpine
        container_name: laravel-nginx
        ports:
            - "8000:80"
        volumes:
            - ./:/var/www/laravel
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - php
        networks:
            - laravel-net

    mysql:
        image: mysql:latest
        container_name: laravel-mysql
        ports:
            - "3316:3306"
        env_file:
            - docker/mysql.env
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - laravel-net

    redis:
        image: redis:alpine
        container_name: laravel-redis
        networks:
            - laravel-net

volumes:
    mysql_data:

networks:
    laravel-net:
